<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Bew3 — Premium Web3 Identity</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050508;
  --glass:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
  --cyan:#37e6ff;
  --purple:#b254ff;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  color:white;
  overflow-x:hidden;
  background:#000;
}

/* 🔥 Animated Background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, #b254ff22, transparent 40%),
    radial-gradient(circle at 80% 70%, #37e6ff22, transparent 40%);
  animation:moveBg 10s infinite alternate;
  z-index:-2;
}
@keyframes moveBg{
  0%{transform:translate(0,0)}
  100%{transform:translate(-40px,-40px)}
}

/* Layout */
main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4vw;
  padding:6vh 8vw;
}
@media(max-width:1000px){
  main{grid-template-columns:1fr}
}

/* Panel */
.panel{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  padding:2rem;
  backdrop-filter:blur(40px);
  box-shadow:0 20px 60px rgba(0,0,0,.8);
  transition:.4s;
}
.panel:hover{
  transform:translateY(-8px);
}

/* Heading */
h1{
  font-family:'Space Grotesk';
  font-size:2.7rem;
  margin-bottom:.5rem;
  background:linear-gradient(90deg,#fff,var(--purple),var(--cyan));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sub{
  color:#aaa;
  margin-bottom:2rem;
}

/* Input */
.field{position:relative;margin-bottom:1.2rem}
.field input{
  width:100%;
  padding:1rem;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
  outline:none;
}
.field label{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#777;
  transition:.2s;
}
.field input:focus+label,
.field input:not(:placeholder-shown)+label{
  top:-8px;
  font-size:.7rem;
  color:var(--cyan);
  background:black;
  padding:0 6px;
}

/* ✨ Premium Button */
button{
  width:100%;
  padding:1rem;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  color:white;
  font-weight:600;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}
button::after{
  content:"";
  position:absolute;
  width:120%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);
  left:-120%;
  top:0;
}
button:hover::after{
  animation:shine 1s;
}
@keyframes shine{
  100%{left:120%}
}

/* Card */
.profile-card{
  position:relative;
  border-radius:24px;
  padding:1.5rem;
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(30px);
  box-shadow:0 30px 100px rgba(0,0,0,.9);
}

/* Glow border */
.profile-card::after{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:inherit;
  background:linear-gradient(270deg,#b254ff,#37e6ff,#ff3fb4,#4d9fff);
  z-index:-1;
  filter:blur(14px);
  animation:spin 6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Avatar */
.frame{
  height:250px;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:1rem;
  position:relative;
}
.frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.4s;
}
.frame:hover img{
  transform:scale(1.1);
}

/* Text */
.name{
  font-family:'Space Grotesk';
  font-size:1.7rem;
  text-align:center;
}
.role{
  text-align:center;
  color:#aaa;
  margin-bottom:1rem;
}
.level{
  text-align:center;
  margin-bottom:1rem;
  color:var(--cyan);
}

/* Stats */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.8rem;
}
.stat{
  padding:.8rem;
  border-radius:12px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  text-align:center;
}

/* Counter Animation */
.fade{
  animation:fadeIn .5s ease;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}
</style>
</head>

<body>

<main>

<section class="panel">
<h1>Web3 Identity</h1>
<p class="sub">Build your premium blockchain identity</p>

<div class="field">
<input id="name" placeholder=" " />
<label>Name</label>
</div>

<div class="field">
<input id="role" placeholder=" " />
<label>Role</label>
</div>

<div class="field">
<input id="year" type="number" placeholder=" " />
<label>Joined Year</label>
</div>

<div class="field">
<input id="earn" type="number" placeholder=" " />
<label>Earnings</label>
</div>

<div class="field">
<input id="dep" type="number" placeholder=" " />
<label>Deposits</label>
</div>

<div class="field">
<input id="img" type="file" />
</div>

<button onclick="generate()">Generate Identity</button>

</section>

<section class="panel">
<div class="profile-card">

<div class="frame">
<img id="preview" />
</div>

<div class="name" id="dname">Your Name</div>
<div class="role" id="drole">Your Role</div>
<div class="level" id="dlevel">Level: Beginner</div>

<div class="stats">
<div class="stat"><b>Earnings</b><div id="dearn">$0</div></div>
<div class="stat"><b>Deposits</b><div id="ddep">$0</div></div>
</div>

</div>
</section>

</main>

<script>
const nameI=name
const roleI=role
const earnI=earn
const depI=dep
const yearI=year
const imgI=img

function generate(){
dname.textContent=nameI.value||"Your Name"
drole.textContent=roleI.value||"Your Role"

animateValue(dearn,0,earnI.value||0)
animateValue(ddep,0,depI.value||0)

const exp=new Date().getFullYear()-yearI.value
let level="Beginner"
if(exp>2) level="Pro"
if(exp>5) level="Elite"
dlevel.textContent="Level: "+level
dlevel.classList.add("fade")
}

function animateValue(el,start,end){
let i=0
const step=end/30
const timer=setInterval(()=>{
i+=step
if(i>=end){
i=end
clearInterval(timer)
}
el.textContent="$"+Math.floor(i)
},20)
}

imgI.onchange=e=>{
const file=e.target.files[0]
if(!file)return
const r=new FileReader()
r.onload=()=>preview.src=r.result
r.readAsDataURL(file)
}
</script>

</body>
</html>
