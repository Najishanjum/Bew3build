<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Bew3 — Premium Web3 Identity</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050508;
  --glass:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
  --cyan:#37e6ff;
  --purple:#b254ff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top, #0a0a1a, #000);
  color:white;
  overflow-x:hidden;
}

/* Layout */
main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4vw;
  padding:6vh 8vw;
}
@media(max-width:1000px){
  main{grid-template-columns:1fr}
}

/* Panel */
.panel{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  padding:2rem;
  backdrop-filter:blur(30px);
  box-shadow:0 10px 40px rgba(0,0,0,.7);
  transition:.3s;
}
.panel:hover{
  transform:translateY(-6px);
}

/* Heading */
h1{
  font-family:'Space Grotesk';
  font-size:2.5rem;
  margin-bottom:.5rem;
  background:linear-gradient(90deg,#fff,var(--purple),var(--cyan));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sub{
  color:#aaa;
  margin-bottom:2rem;
}

/* Floating Input */
.field{position:relative;margin-bottom:1.2rem}
.field input{
  width:100%;
  padding:1rem;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.02);
  color:white;
  outline:none;
}
.field label{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#777;
  transition:.2s;
}
.field input:focus+label,
.field input:not(:placeholder-shown)+label{
  top:-8px;
  font-size:.7rem;
  color:var(--cyan);
  background:black;
  padding:0 6px;
}

/* Button */
button{
  width:100%;
  padding:1rem;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}
button:hover{
  transform:translateY(-2px);
}

/* Card */
.profile-card{
  position:relative;
  border-radius:24px;
  padding:1.5rem;
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 80px rgba(0,0,0,.8);
  transition:.4s;
}
.profile-card:hover{
  transform:translateY(-10px) scale(1.02);
}

/* Glow border */
.profile-card::after{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:inherit;
  background:linear-gradient(270deg,#b254ff,#37e6ff,#ff3fb4,#4d9fff);
  z-index:-1;
  filter:blur(12px);
  animation:spin 6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Avatar */
.frame{
  height:250px;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:1rem;
}
.frame img{width:100%;height:100%;object-fit:cover}

/* Text */
.name{
  font-family:'Space Grotesk';
  font-size:1.6rem;
  text-align:center;
}
.role{
  text-align:center;
  color:#aaa;
  margin-bottom:1rem;
}

/* Stats */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.8rem;
}
.stat{
  padding:.8rem;
  border-radius:12px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
}
</style>
</head>

<body>

<main>

<!-- FORM -->
<section class="panel">
<h1>Web3 Identity</h1>
<p class="sub">Build your premium blockchain identity</p>

<form id="form">

<div class="field">
<input id="name" placeholder=" " />
<label>Name</label>
</div>

<div class="field">
<input id="role" placeholder=" " />
<label>Role</label>
</div>

<div class="field">
<input id="year" type="number" placeholder=" " />
<label>Joined Year</label>
</div>

<div class="field">
<input id="earn" type="number" placeholder=" " />
<label>Earnings</label>
</div>

<div class="field">
<input id="dep" type="number" placeholder=" " />
<label>Deposits</label>
</div>

<div class="field">
<input id="img" type="file" />
</div>

<button type="button">Generate Identity</button>

</form>
</section>

<!-- CARD -->
<section class="panel">
<div class="profile-card">

<div class="frame">
<img id="preview" />
</div>

<div class="name" id="dname">Your Name</div>
<div class="role" id="drole">Your Role</div>

<div class="stats">
<div class="stat"><b>Earnings</b><div id="dearn">$0</div></div>
<div class="stat"><b>Deposits</b><div id="ddep">$0</div></div>
</div>

</div>
</section>

</main>

<script>
const nameI=document.getElementById('name')
const roleI=document.getElementById('role')
const earnI=document.getElementById('earn')
const depI=document.getElementById('dep')
const imgI=document.getElementById('img')

nameI.oninput=()=>dname.textContent=nameI.value||"Your Name"
roleI.oninput=()=>drole.textContent=roleI.value||"Your Role"
earnI.oninput=()=>dearn.textContent="$"+(earnI.value||0)
depI.oninput=()=>ddep.textContent="$"+(depI.value||0)

imgI.onchange=e=>{
const file=e.target.files[0]
if(!file)return
const r=new FileReader()
r.onload=()=>preview.src=r.result
r.readAsDataURL(file)
}
</script>

</body>
</html>
